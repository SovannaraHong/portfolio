<section
  class="relative overflow-hidden bg-[#fdfbf5] h-screen flex items-center py-20 px-6 sm:px-12"
>
  <!-- grain texture -->
  <div class="grain-overlay pointer-events-none absolute inset-0"></div>

  <!-- blue corner wash, top right -->
  <div
    class="pointer-events-none absolute -top-28 -right-28 w-[420px] h-[420px] rounded-full bg-blue-200 blur-[100px] opacity-60"
  ></div>

  <div class="relative w-full max-w-4xl mx-auto text-center">
    <!-- year tag -->
    <span
      class="inline-block border border-neutral-800 text-xs tracking-[0.2em] font-display font-medium px-3 py-1 rounded-sm mb-6"
    >
      2025
    </span>

    <!-- eyebrow -->
    <p class="font-serif-italic text-lg text-neutral-500 mb-1">Software Developer</p>

    <!-- title -->
    <h1
      class="relative inline-block font-display font-bold text-6xl sm:text-8xl leading-none tracking-tight text-neutral-900"
    >
      <span class="script-accent text-blue-600">P</span>ortfolio
      <span
        class="script-signature absolute right-0 sm:-right-6 bottom-0 translate-y-1/3 text-3xl sm:text-4xl text-blue-600"
      >
        Hong Sovannara
      </span>
    </h1>

    <!-- category nav -->
    <nav class="mt-16 flex flex-wrap justify-center gap-8 sm:gap-12">
      @for (item of categories; track $index) {
        <a
          [href]="item.link"
          [attr.download]="item.cate === 'RESUME' ? '' : null"
          target="_blank"
          rel="noopener noreferrer"
          class="group inline-flex items-center gap-1.5 text-sm tracking-wide uppercase text-neutral-900 border-b border-neutral-800/70 pb-1 transition-colors hover:border-blue-600 hover:text-blue-600"
        >
          <span
            class="text-xs transition-transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5"
          >
            <i [class]="item.icon"></i
          ></span>
          {{ item.cate }}
        </a>
      }
    </nav>
  </div>
</section>
