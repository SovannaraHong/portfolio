<section
  class="relative overflow-hidden min-h-screen px-4 sm:px-8 bg-[#fdfbf5] py-14 bg-paper-texture"
>
  <div class="grain-overlay pointer-events-none absolute inset-0"></div>

  <div
    class="pointer-events-none absolute -bottom-32 -left-32 w-[460px] h-[460px] rounded-full bg-orange-200 blur-[110px] opacity-50"
  ></div>
  <div
    class="pointer-events-none absolute top-1/3 left-1/4 w-[320px] h-[320px] rounded-full bg-violet-200 blur-[100px] opacity-35"
  ></div>
  <div
    class="pointer-events-none absolute -top-28 -right-28 w-[420px] h-[420px] rounded-full bg-blue-200 blur-[100px] opacity-60"
  ></div>

  <div class="relative max-w-5xl mx-auto">
    <div class="text-center mb-14 flex justify-center">
      <h1
        class="font-poppins font-bold text-4xl pt-[10px] border-b-3 border-b-[#3fae9b] w-fit sm:text-5xl text-ink"
      >
        Tech Stack
      </h1>
    </div>

    <!-- category boxes: 2 columns, frontend left / backend right, etc. -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div
        *ngFor="let group of groups; let g = index"
        appReveal
        [revealDelay]="g * 80"
        class="category-box relative overflow-hidden rounded-2xl p-6"
      >
        <span class="gradient-line"></span>
        <span class="corner-glow"></span>

        <span
          class="chip {{
            group.chipClass
          }} text-sm inline-block mb-6 font-poppins  bg-[#3fae9b] text-white px-[10px] py-[5px] rounded-[10px]  font-semibold"
          [ngClass]="g % 2 === 0 ? '-rotate-1' : 'rotate-1'"
        >
          {{ group.title }}
        </span>

        <!-- tools: 4 per row -->
        <div class="relative grid grid-cols-4 gap-4 sm:gap-5">
          <div
            *ngFor="let tool of group.tools; let i = index"
            [style.--i]="i"
            class="flex flex-col items-center font-poppins gap-2"
          >
            <div
              class="card-slide-in group relative w-14 h-14 sm:w-16 sm:h-16 rounded-xl bg-white shadow-sm border border-black/5 flex items-center justify-center transition-transform duration-300 hover:-translate-y-1 hover:scale-105 hover:shadow-md"
            >
              <img
                [src]="tool.logo"
                [alt]="tool.name + ' logo'"
                class="w-6 h-6 sm:w-7 sm:h-7 object-contain"
                loading="lazy"
              />
            </div>
            <p class="text-[11px] sm:text-[12px] font-bold text-center leading-tight">
              {{ tool.name }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
