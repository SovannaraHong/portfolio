<section class="relative overflow-hidden min-h-screen px-4 sm:px-8 py-14 bg-paper-texture">
  <div class="grain-overlay pointer-events-none absolute inset-0"></div>

  <div
    class="pointer-events-none absolute -bottom-32 -left-32 w-[460px] h-[460px] rounded-full bg-orange-200 blur-[110px] opacity-50"
  ></div>
  <div
    class="pointer-events-none absolute top-1/3 left-1/4 w-[320px] h-[320px] rounded-full bg-violet-200 blur-[100px] opacity-35"
  ></div>
  <div
    class="pointer-events-none absolute -top-28 -right-28 w-[420px] h-[420px] rounded-full bg-blue-200 blur-[100px] opacity-60"
  ></div>

  <div class="relative max-w-5xl mx-auto">
    <!-- page header -->
    <div class="text-center mb-14">
      <h1 class="font-poppins font-bold text-4xl sm:text-5xl text-ink">Tech Stack</h1>
    </div>

    <div *ngFor="let group of groups; let g = index" class="mb-12 last:mb-0">
      <span
        class="chip {{
          group.chipClass
        }} text-sm inline-block mb-5 font-poppins text-[25px] font-semibold"
        [ngClass]="g % 2 === 0 ? '-rotate-1' : 'rotate-1'"
      >
        {{ group.title }}
      </span>

      <div
        appReveal
        [revealDelay]="g * 80"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-5 sm:gap-6"
      >
        <div
          *ngFor="let tool of group.tools; let i = index"
          class="card-slide-in tool-card group relative"
          [style.--card-color]="tool.color"
          [style.--i]="i"
        >
          <span
            class="tape"
            [ngClass]="i % 3 === 0 ? '-rotate-6' : i % 3 === 1 ? 'rotate-3' : '-rotate-2'"
          ></span>

          <div class="tool-card-inner">
            <div class="tool-badge">
              <img
                [src]="tool.logo"
                [alt]="tool.name + ' logo'"
                class="w-8 h-8 object-contain"
                loading="lazy"
              />
            </div>
            <span class="text-sm font-bold text-white font-poppins">{{ tool.name }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
