<!-- ============ TOP NAVBAR (floating pill, absolute over page) ============ -->
<header
  class="fixed top-4 left-0 w-full z-50 flex justify-center px-4 font-poppins pointer-events-none"
>
  <nav
    class="pointer-events-auto absolute flex items-center gap-1 backdrop-blur-sm py-[5px] rounded-[10px] shadow-md shadow-ink/5 px-2 max-w-full overflow-x-auto"
  >
    <a
      href=""
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="tab-active"
      [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      class="nav-pill flex items-center gap-2 py-[6px] px-2 rounded-[10px] text-ink/70 shrink-0"
    >
      <span class="icon-wrap flex items-center justify-center shrink-0" [ngSwitch]="item.icon">
        <svg
          *ngSwitchCase="'home'"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <path d="M9 22V12h6v10" />
        </svg>

        <svg
          *ngSwitchCase="'skill'"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="4" y="4" width="6" height="6" rx="1" />
          <rect x="14" y="4" width="6" height="6" rx="1" />
          <path d="M4 16h.01M4 20h.01M8 16h4M8 20h4M14 16h6M14 20h6" />
        </svg>

        <svg
          *ngSwitchCase="'folder'"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"
          />
        </svg>

        <svg
          *ngSwitchCase="'briefcase'"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          <rect x="2" y="6" width="20" height="14" rx="2" />
          <path d="M2 13h20" />
        </svg>

        <svg
          *ngSwitchCase="'wrench'"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
          />
        </svg>

        <svg
          *ngSwitchCase="'edit'"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
        </svg>
      </span>

      <span class="label whitespace-nowrap font-poppins text-sm overflow-hidden">
        {{ item.label }}
      </span>
    </a>
  </nav>
</header>
