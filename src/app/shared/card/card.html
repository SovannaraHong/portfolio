<section class="rounded-3xl bg-[#F7F5EF] h-screen p-6 md:p-10 font-['Inter',sans-serif]">
  <div class="mb-8">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#9A9C8E]">Selected work</p>
    <h2
      class="mt-2 text-3xl font-bold text-[#142420]"
      style="font-family: 'Space Grotesk', sans-serif"
    >
      Recent projects
    </h2>
  </div>

  <div class="grid grid-cols-2 gap-4">
    @for (project of projects; track project.name; let i = $index) {
      <article
        class="card-enter group relative flex overflow-hidden rounded-2xl border border-[#E7E3D8] bg-white transition-all duration-300 hover:-translate-y-0.5 hover:border-transparent hover:shadow-[0_10px_30px_rgba(20,36,32,0.10)]"
        [class.slide-from-right]="i % 2 === 1"
        [style.animation-delay.ms]="i * 70"
      >
        <div
          class="flex w-9 shrink-0 items-center justify-center md:w-10"
          [ngClass]="{
            'bg-[#FF6B52]': project.accent === 'coral',
            'bg-[#C6DC4C]': project.accent === 'lime',
            'bg-[#2B6F62]': project.accent === 'teal',
          }"
        >
          <span
            class="whitespace-nowrap text-[10px] font-semibold uppercase tracking-[0.2em]"
            style="writing-mode: vertical-rl; transform: rotate(180deg)"
            [ngClass]="{
              'text-[#4A1B0C]': project.accent === 'coral',
              'text-[#333F14]': project.accent === 'lime',
              'text-white': project.accent === 'teal',
            }"
          >
            {{ project.category }}
          </span>
        </div>

        <div class="flex flex-1 items-start gap-4 p-5 md:p-6">
          <div
            class="flex h-11 w-11 shrink-0 items-center justify-center overflow-hidden rounded-full bg-[#F1EFE8] text-sm font-bold text-[#142420]"
          >
            @if (project.logo) {
              <img
                [src]="project.logo"
                [alt]="project.name + ' logo'"
                class="h-full w-full object-cover"
              />
            } @else {
              {{ project.initials }}
            }
          </div>

          <div class="min-w-0 flex-1">
            <div class="flex items-start justify-between gap-4">
              <h3
                class="text-lg font-bold text-[#142420]"
                style="font-family: 'Space Grotesk', sans-serif"
              >
                {{ project.name }}
              </h3>

              <a
                [href]="project.link"
                target="_blank"
                class="hidden shrink-0 items-center gap-1 whitespace-nowrap text-sm font-semibold text-[#142420] transition-all duration-300 md:flex md:-translate-x-2 md:opacity-0 md:group-hover:translate-x-0 md:group-hover:opacity-100"
              >
                View
                <svg
                  class="h-4 w-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M17 8l4 4m0 0l-4 4m4-4H3"
                  />
                </svg>
              </a>
            </div>

            <p class="mt-1 text-sm leading-relaxed text-[#6E756D]">
              {{ project.description }}
            </p>

            <div class="mt-3 flex flex-wrap gap-2">
              @for (tag of project.stack; track tag) {
                <span
                  class="rounded-full bg-[#F1EFE8] px-2.5 py-1 text-xs font-medium text-[#5B6058]"
                >
                  {{ tag }}
                </span>
              }
            </div>
          </div>
        </div>
      </article>
    }
  </div>
</section>
