<!-- ============ INTRO COUNTER (unchanged) ============ -->
<div
  *ngIf="loading()"
  class="loader-screen fixed inset-0 z-50 flex items-center justify-center bg-neutral-50 transition-opacity duration-500 ease-out"
  [class.opacity-0]="fadeOut()"
  [class.pointer-events-none]="fadeOut()"
>
  <div class="grain-overlay pointer-events-none absolute inset-0"></div>
  <div
    class="pointer-events-none absolute -top-28 -right-28 w-[420px] h-[420px] rounded-full bg-blue-600 blur-[100px] opacity-60"
  ></div>

  <div class="relative text-center">
    <p class="font-serif-italic text-lg text-neutral-500 mb-3">Loading Portfolio</p>
    <div class="font-display font-bold text-7xl sm:text-9xl text-neutral-900 tabular-nums">
      {{ count() }}
    </div>
    <div class="mt-6 w-56 sm:w-72 h-1 bg-neutral-200 rounded-full overflow-hidden mx-auto">
      <div
        class="h-full bg-blue-600 transition-all duration-75 ease-linear"
        [style.width.%]="count()"
      ></div>
    </div>
  </div>
</div>

<div class="flex flex-col min-h-screen bg-paper-texture" [class.invisible]="loading()">
  <app-sidebar></app-sidebar>

  <main class="flex-1 min-w-0 pt-0">
    <router-outlet></router-outlet>
  </main>
</div>
